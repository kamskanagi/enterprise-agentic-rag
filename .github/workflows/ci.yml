name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install ruff black
      - name: Ruff check
        run: ruff check atlasrag/src/ atlasrag/tests/
      - name: Black check
        run: black --check atlasrag/src/ atlasrag/tests/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest atlasrag/tests/ -v --cov=atlasrag/src --cov-report=term-missing --cov-fail-under=70

  evaluate:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run evaluation
        run: python -m atlasrag.scripts.evaluate --dataset atlasrag/eval/golden_dataset.jsonl
        continue-on-error: true
