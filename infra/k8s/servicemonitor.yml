apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: atlasrag-api
  namespace: atlasrag
  labels:
    app.kubernetes.io/name: atlasrag
    app.kubernetes.io/component: api
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: atlasrag
      app.kubernetes.io/component: api
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
