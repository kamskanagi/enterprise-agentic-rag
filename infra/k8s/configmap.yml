apiVersion: v1
kind: ConfigMap
metadata:
  name: atlasrag-config
  namespace: atlasrag
  labels:
    app.kubernetes.io/name: atlasrag
    app.kubernetes.io/component: config
data:
  LLM_PROVIDER: "ollama"
  OLLAMA_BASE_URL: "http://ollama:11434"
  VECTOR_STORE: "chroma"
  CHROMA_PERSIST_DIRECTORY: "/data/chroma"
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"
  ENABLE_METRICS: "true"
