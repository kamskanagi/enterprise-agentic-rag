apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlasrag-api
  namespace: atlasrag
  labels:
    app.kubernetes.io/name: atlasrag
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: atlasrag
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: atlasrag
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: atlasrag-api
          image: atlasrag:latest
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: atlasrag-config
            - secretRef:
                name: atlasrag-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      restartPolicy: Always
