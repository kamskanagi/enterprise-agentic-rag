apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: atlasrag-api
  namespace: atlasrag
  labels:
    app.kubernetes.io/name: atlasrag
    app.kubernetes.io/component: api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: atlasrag-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
